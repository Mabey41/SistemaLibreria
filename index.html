<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Gestión Librería Sueños</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- ENCABEZADO -->
  <header class="header">
    <div class="logo-container">
      <img src="./img/logo.png" alt="Logo Librería Sueños" class="logo">
    </div>
    <div class="title">SISTEMA DE GESTIÓN LIBRERÍA SUEÑOS</div>
  </header>

  <!-- BIENVENIDA -->
  <div class="welcome-text">¡Bienvenido!</div>

  <!-- FORMULARIO -->
  <div class="login-container">
    <form id="loginForm">
      <div class="form-group">
        <label for="username"><i class="fas fa-user icon"></i>Usuario</label>
        <input type="text" id="username" class="input" required />
      </div>

      <div class="form-group">
        <label for="password"><i class="fas fa-lock icon"></i>Contraseña</label>
        <input type="password" id="password" class="input" required />
      </div>

      <div class="form-group">
        <label for="role"><i class="fas fa-users icon"></i>Rol</label>
        <select id="role" class="input" required>
          <option value="">Seleccione un rol</option>
          <option value="admin">Administrador</option>
          <option value="empleado">Area atención al cliente</option>
          <option value="especial">Empleado</option>
        </select>
      </div>

      <button type="submit" class="login-btn">Iniciar Sesión</button>
      <p class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></p>
    </form>
  </div>

  <!-- PIE DE PÁGINA -->
  <footer class="footer">
    <a href="#">Términos de uso</a> | 
    <a href="#">Política de privacidad</a><br />
    Versión 1.0 • Uso interno del sistema • 2025 Librería Sueños
  </footer>

  <script src="scrpit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
