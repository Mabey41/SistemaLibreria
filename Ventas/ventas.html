<body>
  <div class="form-container">
    <div class="icono">
      <i class="fa-solid fa-dollar-sign"></i>
    </div>
    <p>Por favor, ingrese los datos requeridos</p>

    <form id="salesForm">
      <div class="form-group">
        <label for="saleId"><i class="fa-regular fa-calendar-check icon-left"></i> ID de la venta:</label>
        <input type="text" id="saleId" name="saleId" readonly />
      </div>

      <div class="form-group">
        <label for="clientName"><i class="fa-solid fa-user icon-left"></i> Nombre del cliente:</label>
        <input type="text" id="clientName" name="clientName" placeholder="Buscar o escribir cliente" autocomplete="off" list="client-list"/>
        <datalist id="client-list">
          <option value="Juan Perez">
          <option value="Maria Lopez">
          <option value="Carlos Garcia">
          <option value="Ana Martinez">
        </datalist>
      </div>

      <div class="form-group">
        <label for="saleDate"><i class="fa-regular fa-calendar icon-left"></i> Fecha:</label>
        <input type="text" id="saleDate" name="saleDate" readonly />
      </div>

      <div class="form-group">
        <label for="paymentMethod"><i class="fa-solid fa-comments-dollar icon-left"></i> Método de pago:</label>
        <select id="paymentMethod" name="paymentMethod" required>
          <option value="Efectivo" selected>Efectivo</option>
          <option value="Tarjeta">Tarjeta</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="product"><i class="fa-regular fa-list-alt icon-left"></i> Productos:</label>
        <input type="text" id="product" name="product" placeholder="Buscar y seleccionar producto" autocomplete="off" list="product-list" required/>
        <datalist id="product-list">
          <option value="El principito Antonie de Saint Exupéry">
          <option value="Cien años de soledad Grabiel García Marquez">
          <option value="Rayuela Julio Cortázar">
        </datalist>
      </div>

      <div class="form-group">
        <label for="quantity"><i class="fa-solid fa-boxes-packing icon-left"></i> Cantidad:</label>
        <select id="quantity" name="quantity" required>
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="form-group">
        <label for="total"><i class="fa-solid fa-money-bill-wave icon-left"></i> Total a pagar:</label>
        <input type="text" id="total" name="total" readonly placeholder="(Automático)" />
      </div>

      <button type="submit" class="btn-submit">REGISTRAR VENTA</button>

      <div class="cancelar">
        <a href="#">CANCELAR</a>
      </div>
    </form>
  </div>
